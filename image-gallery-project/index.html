<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Orvix | Modern Image Gallery</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

  <!-- NAVBAR -->

  <nav>

    <div class="logo">
      Orvix
    </div>

    <ul>

      <li><a href="#home">Home</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#contact">Contact</a></li>

    </ul>

  </nav>

  <!-- HERO -->

  <section class="hero" id="home">

    <div class="hero-left">

      <button class="tag">
        Creative Stories
      </button>

      <h1>
        Photo Gallery
      </h1>

      <p>
        Explore artistic visuals, cinematic photography and premium image collections.
      </p>

    </div>

    <div class="hero-right">

      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">

    </div>

  </section>

  <!-- GALLERY -->

  <section class="gallery-section" id="gallery">

    <div class="gallery-title">

      <h2>
        Gallery Collection
      </h2>

      <p>
        Hover images to explore modern transitions and smooth animations.
      </p>

    </div>

    <div class="gallery">

      <div class="card large">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop">
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1200&auto=format&fit=crop">
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1472396961693-142e6e269027?q=80&w=1200&auto=format&fit=crop">
      </div>

      <div class="card wide">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop">
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=1200&auto=format&fit=crop">
      </div>

    </div>

  </section>

  <!-- SLIDER -->

  <section class="slider-section">

    <div class="slider-title">

      <h2>
        Featured Slider
      </h2>

    </div>

    <div class="slider-container">

      <button class="prev">
        <i class="fa-solid fa-angle-left"></i>
      </button>

      <div class="slider">

        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1500534623283-312aade485b7?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1504593811423-6dd665756598?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

      </div>

      <button class="next">
        <i class="fa-solid fa-angle-right"></i>
      </button>

    </div>

  </section>

  <!-- CONTACT -->

  <section class="contact" id="contact">

    <h2>Contact</h2>

    <p>
      hello@orvixgallery.com
    </p>

    <p>
      Instagram : @orvixgallery
    </p>

  </section>

</div>

<!-- LIGHTBOX -->

<div class="lightbox">

  <button class="close">
    <i class="fa-solid fa-xmark"></i>
  </button>

  <button class="light-prev">
    <i class="fa-solid fa-angle-left"></i>
  </button>

  <img class="lightbox-img">

  <button class="light-next">
    <i class="fa-solid fa-angle-right"></i>
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
